classification_prompt: 'Klassifiziere das folgende Dokument basierend auf den ersten
  1000 Zeichen seines Inhalts in eine der folgenden Kategorien:

  - Lebenslauf

  - Anschreiben

  - Zertifikat

  - Diplom

  - Sonstiges


  Textauszug des Dokuments:

  {doc_text}


  Antworte ausschließlich mit dem Namen der Kategorie (z.B. Lebenslauf).'
cover_letter_prompt: "Erstelle ein professionelles Anschreiben auf Deutsch für eine\
  \ Bewerbung als Systemadministrator / DevOps / Cloud Engineer (Junior-Level) basierend\
  \ auf dem Kandidatenprofil und der Stellenbeschreibung.\nDas Anschreiben MUSS den\
  \ Standard DIN 5008 (Layout für Geschäftsbriefe) einhalten.\n\nKandidatenprofil:\n\
  {candidate_profile}\n\nStellenbeschreibung:\n{job_description}\n\nZusätzliche Vorgaben\
  \ für das Anschreiben:\n- Gehaltsvorstellung: {salary_exp} € brutto pro Jahr (nicht\
  \ verhandelbar).\n- Verfügbarkeit / Eintrittstermin: {availability}.\n- Berufserfahrung\
  \ in der IT: Seit {career_start_year} (bitte organisch einbinden).\n- Sprachniveau\
  \ Deutsch: Der Kandidat spricht Deutsch auf dem Niveau {candidate_german} (bitte\
  \ das Anschreiben sprachlich auf diesem Niveau halten, fehlerfrei, aber nicht übertrieben\
  \ akademisch geschwollen).\n- Pflichtkompetenzen: Binde die folgenden Pflichtkompetenzen\
  \ organisch in den Text ein (sie müssen im Anschreiben erwähnt werden): {mandatory_skills}.\n\
  - Übersetzungs-Regel (Übersetzung von Fachbegriffen in geschäftliche HR-Mehrwerte):\n\
  \  Übersetze technische Begriffe oder rohe Skills aus dem Lebenslauf in konkrete\
  \ geschäftliche Vorteile für den Personaler. Zum Beispiel:\n  * Statt nur \"Docker,\
  \ K8s\" -> \"modernisierte die Systemarchitektur für maximale Ausfallsicherheit\
  \ und beschleunigte Deployment-Zyklen\"\n  * Statt \"Python Scripting\" -> \"automatisierte\
  \ zeitintensive Routineaufgaben, was die Fehlerquote und Betriebskosten signifikant\
  \ senkte\"\n  * Statt \"Azure Cloud\" -> \"optimierte Cloud-Ressourcen für kosteneffizienten\
  \ Betrieb und hohe Verfügbarkeit\"\n\nFormat des Geschäftsbriefs (DIN 5008):\n1.\
  \ Absender (Kandidat: Name, E-Mail, Telefon, Anschrift).\n2. Empfänger (Unternehmen\
  \ aus der Stellenbeschreibung, falls ermittelbar, sonst allgemein).\n3. Datum (rechtsbündig).\n\
  4. Betreffzeile: Fett gedruckt (z.B. **Bewerbung als Junior Systemadministrator**\
  \ - Referenz falls vorhanden).\n5. Anrede (z.B. 'Sehr geehrte Damen und Herren'\
  \ oder Name des Ansprechpartners falls bekannt).\n6. Brieftext (Einleitung, Bezug\
  \ zur Stelle, Motivation, Kompetenzen & Mehrwert mit Übersetzungs-Regel, Gehalt\
  \ & Eintritt, Schlusssatz).\n7. Grußformel (Mit freundlichen Grüßen).\n8. Unterschrift\
  \ (gedruckter Name des Kandidaten).\n\nGib NUR den reinen Text des Anschreibens\
  \ aus. Keine Erklärungen, kein Markdown-Wrapper."
extract_recruiter_prompt: 'Extrahiere den vollständigen Namen des Recruiters/Ansprechpartners
  aus der folgenden Stellenbeschreibung.


  Der E-Mail-Kontakt für Bewerbungen ist: {email}


  Stellenbeschreibung:

  {job_text}


  Gib NUR den Namen zurück (z.B. "Max Mustermann"). Wenn kein Name gefunden wird,
  gib eine leere Zeile zurück.'
form_filler_prompt: "Du bist ein Assistent, der ein Webformular für eine Bewerbung\
  \ ausfüllt. Analysiere die Liste der interaktiven Elemente (Inputs, Buttons, Uploads)\
  \ und entscheide für jedes Element, welche Aktion auszuführen ist.\nKandidatenprofil:\n\
  {candidate_profile}\n\nZusätzliche Angaben:\n- Gehaltsvorstellung: {salary_expectation}\n\
  - Frühestmöglicher Eintrittstermin: {availability}\n- Arbeitserlaubnis für Deutschland\
  \ vorhanden: {work_permit}\n\nVerfügbare Elemente auf der Seite:\n{elements}\n\n\
  Gib die Liste der auszuführenden Aktionen als JSON-Array von Objekten zurück (ohne\
  \ Markdown-Wrapper):\n[\n  {{\n    \"element_id\": \"input-1\",\n    \"action\"\
  : \"fill\",\n    \"value\": \"Max\"\n  }},\n  {{\n    \"element_id\": \"upload-cv\"\
  ,\n    \"action\": \"upload_cv\"\n  }},\n  {{\n    \"element_id\": \"upload-cover\"\
  ,\n    \"action\": \"upload_cover_letter\"\n  }},\n  {{\n    \"element_id\": \"\
  submit-btn\",\n    \"action\": \"click\"\n  }}\n]"
scoring_prompt: "Du bist ein erfahrener IT-Recruiter in Deutschland. Vergleiche das\
  \ Kandidatenprofil mit der Stellenbeschreibung (Job Description).\nBewerte das Match\
  \ auf einer Skala von 0 bis 10.\n\nEin Score von 10 bedeutet perfekte Übereinstimmung.\
  \ Ein Score von 0 bedeutet, dass K.O.-Kriterien greifen oder die Rolle absolut unpassend\
  \ ist (z.B. Full Stack Entwickler).\n\nDu MUSST die folgenden Regeln strikt anwenden:\n\
  1. Mindestgehalt: Wenn das in der Anzeige erwähnte Jahresgehalt unter {min_salary}\
  \ € liegt, setze den Score auf 0 und ko_criterion_triggered auf true.\n2. Sprachen:\n\
  \    - Der Kandidat besitzt Deutschkenntnisse auf dem Niveau {candidate_german}\
  \ (B2). Wenn die Stelle Deutsch C1, C2 oder \"verhandlungssicher\" voraussetzt (auch\
  \ ohne explizite \"Muss\"-Formulierung), setze den Score SOFORT auf 0 und ko_criterion_triggered\
  \ auf true.\n   - Der Kandidat besitzt Englischkenntnisse auf dem Niveau {candidate_english}\
  \ (A2). ACHTUNG — NUR \"verhandlungssicher Englisch\", \"fließend Englisch\", \"\
  fluent English\", \"excellent English\", \"English C1\", \"business fluent\" lösen\
  \ ein K.O. aus. \"Gute Englischkenntnisse\" / \"good English\" ist KEIN K.O. — nur\
  \ Abzug in der Teilbewertung.\n3. K.O.-Kriterien / Ausschlüsse:\n   - U.S. Staatsbürgerschaft\
  \ (U.S. citizenship), Sicherheitsfreigabe (Secret/Top Secret clearance) oder TESA-Status:\
  \ Wenn eines davon erforderlich ist (z.B. {clearance_keywords}), setze den Score\
  \ auf 0 und ko_criterion_triggered auf true.\n   - Pflichtzertifikate: Wenn die\
  \ Stelle Zertifizierungen wie Red Hat ({certifications}) zwingend voraussetzt und\
  \ der Kandidat diese nicht hat, setze den Score auf 0.\n   - Bildungsanbieter /\
  \ Weiterbildungsangebote: Wenn es sich bei dem Angebot um eine reine Umschulung,\
  \ Ausbildung oder Weiterbildung von einem Bildungsanbieter (z.B. {spam_keywords})\
  \ handelt, die eine Schulung/Werbung statt einer regulären Arbeitsstelle ist, setze\
  \ den Score auf 0 und ko_criterion_triggered auf true.\n    - Full Stack Rollen:\
  \ Wenn der Titel \"Full Stack Developer\", \"Fullstack Developer\" oder ähnlich\
  \ lautet, setze den Score auf 0 (Kandidat sucht Systemadministration oder reines\
  \ Backend).\n   - Consultant oder Support Rollen: Wenn der Titel \"Consultant\"\
  \ oder \"Support\" enthält (z.B. IT Consultant, Support Engineer), setze den Score\
  \ SOFORT auf 0 und ko_criterion_triggered auf true.\n4. Akademischer Grad (Computer\
  \ Science / Software Engineering Degree):\n   - Wenn ein akademisches IT-Studium\
  \ zwingend und ohne Ausweichklausel (\"oder vergleichbare Berufserfahrung\") gefordert\
  \ wird, setze den Score auf 0.\n5. Berufserfahrung (IT-Erfahrung seit {career_start_year}):\n\
  \   - Der Kandidat ist auf Junior-Ebene (Einstiegslevel). Wenn die Stelle mehr als\
  \ 3 Jahre relevante Berufserfahrung verlangt, bewerte den Score niedrig oder setze\
  \ ihn auf 0.\n6. Regionale Einschränkung (Format der Arbeit):\n   - Stellen vor\
  \ Ort (On-site) in Frankfurt am Main, Hanau, Offenbach, Hessen (Umkreis bis 35 km)\
  \ werden positiv bewertet.\n   - Stellen vor Ort (On-site) in anderen Regionen (z.B.\
  \ Berlin, München, Hamburg) sind K.O. (Score 0).\n\n{rejections_str}\n\nStellenbeschreibung:\n\
  {job_description}\n\nGib das Ergebnis ausschließlich als valides JSON-Objekt im\
  \ folgenden Format zurück (ohne Markdown-Formatierung wie ```json):\n{{\n  \"total_score\"\
  : 8.5,\n  \"ko_criterion_triggered\": false,\n  \"reasoning\": \"Detaillierte Begründung\
  \ auf Deutsch, warum dieser Score vergeben wurde...\"\n}}"
